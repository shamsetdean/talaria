<style>
:root {
  --bg: #07080f;
  --bg-2: rgba(7,8,15,0.92);
  --bg-3: rgba(7,8,15,0.97);
  --ink: #ffffff;
  --ink-2: rgba(255,255,255,0.68);
  --ink-3: rgba(255,255,255,0.45);
  --ink-4: rgba(255,255,255,0.28);
  --b-1: rgba(255,255,255,0.04);
  --b-2: rgba(255,255,255,0.07);
  --b-3: rgba(255,255,255,0.12);
  --bd-1: rgba(255,255,255,0.08);
  --bd-2: rgba(255,255,255,0.16);
  --blue: #4488ff;
  --blue-soft: rgba(68,136,255,0.14);
  --green: #00d68f;
  --orange: #ff9f43;
  --red: #ff4757;
  --purple: #a855f7;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --sheet-peek: 96px;
  --sheet-mid: 52vh;
  --sheet-full: 92vh;
  --d2: var(--b-1);
  --d3: var(--b-2);
  --b3: var(--b-3);
  --ink2: var(--ink-2);
  --ink3: var(--ink-3);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
*:focus { outline: none; }

html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}
body {
  font-family: 'Outfit', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: #1a1a25;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ═══ MAP — full-bleed, bottom layer ═══ */
#map {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: #1a1a25;
}
.leaflet-control-attribution {
  background: rgba(7,8,15,0.6) !important;
  color: rgba(255,255,255,0.5) !important;
  font-size: 9px !important;
  padding: 2px 6px !important;
}
.leaflet-control-attribution a { color: rgba(255,255,255,0.7) !important; }

/* ═══ Overlays ═══ */
.ovl {
  position: fixed;
  z-index: 100;
  pointer-events: none;
}
.ovl > * { pointer-events: auto; }

.ovl-tl {
  top: calc(12px + var(--safe-top));
  left: 12px;
}
.logo {
  background: var(--bg-2);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  backdrop-filter: blur(20px) saturate(160%);
  padding: 8px 12px 8px 10px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  border: 0.5px solid var(--bd-1);
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--ink);
}
.logo svg { width: 18px; height: 18px; flex-shrink: 0; }

.ovl-tr {
  top: calc(12px + var(--safe-top));
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
}

.capsule {
  background: var(--bg-2);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  backdrop-filter: blur(20px) saturate(160%);
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
  border: 0.5px solid var(--bd-1);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
}
.capsule:empty { display: none; }
.capsule .env-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.capsule.env-alert {
  border-color: var(--orange);
  background: rgba(255,159,67,0.18);
}

/* Map action buttons (vertical stack) */
.map-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 4px;
}
.mapbtn, button.mapbtn {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--bg-2);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  backdrop-filter: blur(20px) saturate(160%);
  border: 0.5px solid var(--bd-1);
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform .15s ease, background .15s, border-color .15s;
  padding: 0;
  font-family: inherit;
}
.mapbtn svg { width: 18px; height: 18px; }
.mapbtn:active { transform: scale(0.92); }
.mapbtn.on { background: var(--blue); border-color: var(--blue); color: #fff; }

/* Top banner (rush hour, etc.) */
.ovl-banner {
  position: fixed;
  top: calc(64px + var(--safe-top));
  left: 12px;
  right: 12px;
  z-index: 95;
  background: rgba(255,159,67,0.94);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  color: #2a1a05;
  padding: 9px 14px;
  border-radius: 12px;
  font-size: 12.5px;
  font-weight: 600;
  text-align: center;
  border: 0.5px solid rgba(0,0,0,0.1);
  animation: bannerIn .5s ease both;
  pointer-events: auto;
}
.ovl-banner.hidden { display: none; }
@keyframes bannerIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

/* Notif (top sliding from below logo if needed) */
#notif {
  position: fixed;
  top: calc(12px + var(--safe-top));
  left: 50%;
  transform: translate(-50%, -120%);
  z-index: 300;
  background: var(--bg-3);
  -webkit-backdrop-filter: blur(28px);
  backdrop-filter: blur(28px);
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 13px;
  border: 0.5px solid var(--bd-2);
  max-width: calc(100vw - 24px);
  display: flex;
  gap: 10px;
  align-items: flex-start;
  transition: transform .35s cubic-bezier(.32,.72,0,1);
  pointer-events: auto;
}
#notif.show { transform: translate(-50%, 0); }
#notif.warn { border-color: var(--orange); }
#notif.err  { border-color: var(--red); }
#notif.ok   { border-color: var(--green); }

/* Tap-to-route preview card (overlay) */
#tapCard {
  position: fixed;
  top: calc(64px + var(--safe-top));
  left: 12px;
  right: 12px;
  z-index: 95;
  background: var(--bg-3);
  -webkit-backdrop-filter: blur(28px);
  backdrop-filter: blur(28px);
  border: 0.5px solid var(--bd-2);
  border-radius: 16px;
  padding: 14px 16px;
  transform: translateY(-150%);
  transition: transform .4s cubic-bezier(.32,.72,0,1);
  pointer-events: auto;
}
#tapCard.show { transform: translateY(0); }

/* ═══ BOTTOM SHEET ═══ */
.sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 200;
  background: rgba(7,8,15,0.96);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  backdrop-filter: blur(28px) saturate(180%);
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
  border-top: 0.5px solid var(--bd-2);
  height: var(--sheet-mid);
  display: flex;
  flex-direction: column;
  padding-bottom: var(--safe-bot);
  transition: height .42s cubic-bezier(.32,.72,0,1);
  will-change: height;
  box-shadow: 0 -2px 24px rgba(0,0,0,0.35);
}
.sheet[data-state="peek"] { height: var(--sheet-peek); }
.sheet[data-state="mid"]  { height: var(--sheet-mid); }
.sheet[data-state="full"] { height: var(--sheet-full); }
.sheet.dragging { transition: none; }

.sheet-handle {
  width: 100%;
  padding: 9px 0 6px;
  display: flex;
  justify-content: center;
  cursor: grab;
  flex-shrink: 0;
  touch-action: none;
}
.sheet-handle::before {
  content: '';
  width: 40px;
  height: 5px;
  background: var(--ink-4);
  border-radius: 3px;
  transition: background .2s;
}
.sheet.dragging .sheet-handle::before { background: var(--ink-2); }

/* Peek state: show only the "Où allez-vous ?" CTA */
.sheet-peek-cta {
  margin: 0 14px;
  background: var(--b-2);
  border: 0.5px solid var(--bd-1);
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  font-size: 14.5px;
  color: var(--ink-2);
  transition: background .15s, border-color .15s;
}
.sheet-peek-cta:active {
  background: var(--b-3);
}
.sheet-peek-cta .arrow {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--blue-soft);
  color: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.sheet[data-state="peek"] .sheet-content { display: none; }
.sheet:not([data-state="peek"]) .sheet-peek-cta { display: none; }

.sheet-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Tabs */
.tabs {
  display: flex;
  align-items: center;
  padding: 4px 8px 0;
  border-bottom: 0.5px solid var(--bd-1);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--ink-3);
  font-size: 13.5px;
  font-weight: 500;
  font-family: inherit;
  padding: 13px 4px;
  cursor: pointer;
  position: relative;
  transition: color .18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.tab.active { color: var(--ink); }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -0.5px;
  left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 2px;
  background: var(--blue);
  border-radius: 2px;
}
.tab-icon {
  width: 38px;
  height: 38px;
  background: transparent;
  border: none;
  color: var(--ink-3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-family: inherit;
  flex-shrink: 0;
  transition: color .15s;
}
.tab-icon:active { color: var(--ink); }
.tab-icon svg { width: 19px; height: 19px; }

.badge {
  display: none;
  width: 7px;
  height: 7px;
  background: var(--red);
  border-radius: 50%;
  box-shadow: 0 0 0 2px var(--red);
  animation: pulse 1.6s ease infinite;
}
.badge.on { display: inline-block; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.6); }
  50% { box-shadow: 0 0 0 4px rgba(255,71,87,0); }
}

/* Pages container */
.pages {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 14px 14px calc(20px + var(--safe-bot));
}
.page { display: none; animation: pageIn .25s ease both; }
.page.active { display: block; }
@keyframes pageIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* Section titles inside pages */
.block-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin: 14px 2px 8px;
}
.block-title:first-child { margin-top: 4px; }

/* Form fields */
.iwrap {
  background: var(--b-1);
  border: 0.5px solid var(--bd-1);
  border-radius: 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  position: relative;
  transition: border-color .15s, background .15s;
}
.iwrap:focus-within { border-color: var(--blue); background: rgba(68,136,255,0.05); }
.iwrap .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 12px;
  flex-shrink: 0;
}
.iwrap .dot.a { background: var(--blue); }
.iwrap .dot.b { background: var(--red); }
.iwrap input {
  flex: 1;
  background: none;
  border: none;
  color: var(--ink);
  font-family: inherit;
  font-size: 15px;
  padding: 14px 0;
  min-width: 0;
}
.iwrap input::placeholder { color: var(--ink-3); }
.idot-btn {
  width: 32px;
  height: 32px;
  background: var(--b-2);
  border: none;
  border-radius: 50%;
  color: var(--ink-2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-left: 6px;
  font-family: inherit;
  padding: 0;
}
.idot-btn:active { transform: scale(0.92); }
.idot-btn .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--blue);
  margin: 0;
}

.swap-btn {
  position: absolute;
  right: 8px;
  top: -22px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--b-3);
  border: 0.5px solid var(--bd-2);
  color: var(--ink);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  font-family: inherit;
  font-size: 14px;
}
.swap-btn:active { transform: scale(0.92) rotate(180deg); transition: transform .25s; }

/* Autocomplete */
.ac {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--bg-3);
  border: 0.5px solid var(--bd-2);
  border-radius: 14px;
  margin-top: 6px;
  max-height: 240px;
  overflow-y: auto;
  z-index: 10;
  display: none;
}
.aci {
  padding: 12px 14px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 0.5px solid var(--bd-1);
  color: var(--ink-2);
}
.aci:last-child { border-bottom: none; }
.aci:active, .aci:hover { background: var(--b-2); color: var(--ink); }

/* Buttons */
.btn {
  width: 100%;
  background: var(--blue);
  border: none;
  border-radius: 14px;
  padding: 16px;
  color: #fff;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform .12s, background .15s, opacity .15s;
  margin-top: 4px;
}
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: .55; pointer-events: none; }
.btn-ghost {
  background: var(--b-2);
  color: var(--ink);
  border: 0.5px solid var(--bd-1);
}

/* Optimisation pills (after a route is calculated) */
.opt-pills {
  display: flex;
  gap: 6px;
  margin: 12px 0 8px;
  flex-wrap: wrap;
}
.opt-pill {
  background: var(--b-2);
  border: 0.5px solid var(--bd-1);
  color: var(--ink-2);
  padding: 7px 14px;
  border-radius: 99px;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.opt-pill.on {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}

/* Favorites & recents chips */
.favs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 6px;
}
.fav-chip {
  background: var(--b-2);
  border: 0.5px solid var(--bd-1);
  color: var(--ink);
  padding: 9px 14px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  max-width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.fav-chip:active { transform: scale(0.96); }
.fav-star { color: var(--orange); font-size: 12px; }

.empty-hint {
  font-size: 13.5px;
  color: var(--ink-3);
  text-align: center;
  padding: 30px 18px;
  line-height: 1.55;
}

/* Route results (jcard) */
.jlist { display: flex; flex-direction: column; gap: 10px; }
.jcard {
  background: var(--b-1);
  border: 0.5px solid var(--bd-1);
  border-radius: 16px;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.jcard:active { background: var(--b-2); }
.jcard.best { border-color: var(--blue); background: rgba(68,136,255,0.06); }
.jhead { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.jdur { font-size: 26px; font-weight: 700; color: var(--ink); font-family: 'JetBrains Mono', monospace; }
.jright { text-align: right; }
.jtimes { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--ink-2); margin-bottom: 2px; }
.jarr { font-size: 11px; color: var(--ink-3); }
.jbadge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--blue-soft);
  color: var(--blue);
  padding: 3px 8px;
  border-radius: 99px;
  font-size: 10.5px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}
.jpills { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
.pill {
  background: var(--b-3);
  color: var(--ink-2);
  padding: 4px 9px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}
.pill.WALK { background: rgba(0,214,143,0.16); color: var(--green); }
.pill.METRO { background: rgba(68,136,255,0.16); color: var(--blue); }
.pill.RER { background: rgba(168,85,247,0.16); color: var(--purple); }
.pill.TRAM { background: rgba(255,159,67,0.16); color: var(--orange); }
.pill.BUS { background: rgba(255,71,87,0.16); color: var(--red); }
.pill.RAIL { background: rgba(168,85,247,0.16); color: var(--purple); }

.jdetail { max-height: 0; overflow: hidden; transition: max-height .35s cubic-bezier(.32,.72,0,1); }
.jcard.open .jdetail { max-height: 800px; }
.jdetail-inner { padding-top: 12px; border-top: 0.5px solid var(--bd-1); margin-top: 12px; }
.step { display: flex; gap: 12px; margin-bottom: 12px; }
.sicon {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}
.sicon.WALK { background: rgba(0,214,143,0.16); color: var(--green); }
.sicon.METRO { background: rgba(68,136,255,0.16); color: var(--blue); }
.sicon.RER { background: rgba(168,85,247,0.16); color: var(--purple); }
.sicon.TRAM { background: rgba(255,159,67,0.16); color: var(--orange); }
.sicon.BUS { background: rgba(255,71,87,0.16); color: var(--red); }
.sicon.RAIL { background: rgba(168,85,247,0.16); color: var(--purple); }
.sname { font-size: 13.5px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
.ssub { font-size: 12px; color: var(--ink-3); margin-bottom: 2px; }
.sdur { font-size: 11px; color: var(--ink-2); font-family: 'JetBrains Mono', monospace; }

.share-card {
  background: var(--b-2);
  border-radius: 12px;
  padding: 12px 14px;
  margin-top: 14px;
}
.share-btns { display: flex; gap: 6px; }
.sbtn {
  flex: 1;
  background: var(--b-3);
  border: 0.5px solid var(--bd-1);
  border-radius: 9px;
  padding: 9px;
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  color: var(--ink);
  cursor: pointer;
}
.sbtn:active { transform: scale(0.97); }

/* Loader / error / skeletons */
.loader {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 40px 12px;
  color: var(--ink-2);
  font-size: 13.5px;
}
.spin {
  width: 18px;
  height: 18px;
  border: 2px solid var(--bd-2);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.err {
  background: rgba(255,71,87,0.1);
  border: 0.5px solid rgba(255,71,87,0.3);
  color: #ffb3b3;
  padding: 12px 14px;
  border-radius: 12px;
  font-size: 13px;
  text-align: center;
}

/* Departures (stop popup + arrêts page) */
.depcard {
  background: var(--b-1);
  border: 0.5px solid var(--bd-1);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.depbadge {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}
.depbadge.METRO { background: rgba(68,136,255,0.16); color: var(--blue); }
.depbadge.RER { background: rgba(168,85,247,0.16); color: var(--purple); }
.depbadge.TRAM { background: rgba(255,159,67,0.16); color: var(--orange); }
.depbadge.BUS { background: rgba(255,71,87,0.16); color: var(--red); }
.depbadge.RAIL { background: rgba(168,85,247,0.16); color: var(--purple); }
.depinfo { flex: 1; min-width: 0; }
.depdir { font-size: 13.5px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.depstop { font-size: 11.5px; color: var(--ink-3); }
.deptimes { text-align: right; }
.dept1 { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--green); }
.dept2 { font-size: 11px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

.refbtn {
  background: var(--b-2);
  border: 0.5px solid var(--bd-1);
  color: var(--ink-2);
  font-size: 12px;
  padding: 8px 14px;
  border-radius: 99px;
  cursor: pointer;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}

/* Disruption cards (alerts) */
.disrupt-card {
  background: var(--b-1);
  border: 0.5px solid var(--bd-1);
  border-left: 3px solid var(--orange);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
}
.disrupt-line {
  background: var(--orange);
  color: #2a1a05;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  align-self: flex-start;
  flex-shrink: 0;
}
.disrupt-info { flex: 1; min-width: 0; }
.disrupt-title { font-size: 12px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.disrupt-body { font-size: 12.5px; color: var(--ink-2); line-height: 1.5; }
.disrupt-time { font-size: 10.5px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; margin-top: 4px; }

/* Crowd grid (Alertes page) */
.crowd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 6px;
}
.crowd-cell {
  background: var(--b-1);
  border: 0.5px solid var(--bd-1);
  border-radius: 10px;
  padding: 9px 11px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Incident form */
.inc-types {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.inc-type {
  background: var(--b-2);
  border: 0.5px solid var(--bd-1);
  color: var(--ink-2);
  padding: 7px 12px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
.inc-type.on { background: var(--blue); color: #fff; border-color: var(--blue); }
textarea {
  width: 100%;
  background: var(--b-1);
  border: 0.5px solid var(--bd-1);
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--ink);
  font-family: inherit;
  font-size: 14px;
  resize: vertical;
  min-height: 70px;
}

/* Settings */
.set-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}
.set-row label { font-size: 12px; color: var(--ink-3); font-weight: 500; }
.set-row input {
  background: var(--b-1);
  border: 0.5px solid var(--bd-1);
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--ink);
  font-family: inherit;
  font-size: 14px;
}

/* Stop popup (existing modal pattern) */
.stop-popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 400;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.stop-popup-overlay.on { opacity: 1; pointer-events: auto; }
.stop-popup {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 401;
  background: var(--bg-3);
  -webkit-backdrop-filter: blur(28px);
  backdrop-filter: blur(28px);
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
  padding: 8px 16px calc(20px + var(--safe-bot));
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.32,.72,0,1);
  max-height: 80vh;
  overflow-y: auto;
}
.stop-popup.on { transform: translateY(0); }
.stop-popup-handle {
  width: 40px;
  height: 5px;
  background: var(--ink-4);
  border-radius: 3px;
  margin: 4px auto 12px;
}
.stop-popup-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}

/* Vélib pin (Leaflet divIcon) */
.vlib-pin {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  font-family: 'JetBrains Mono', monospace;
}

/* Stop markers (Leaflet divIcon) */
.sm-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.sm-pin {
  width: 38px; height: 38px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.sm-pin.METRO { background: var(--blue); color: #fff; }
.sm-pin.RER   { background: var(--purple); color: #fff; }
.sm-pin.TRAM  { background: var(--orange); color: #2a1a05; }
.sm-pin.BUS   { background: var(--red); color: #fff; }
.sm-needle {
  width: 2px;
  height: 8px;
  background: rgba(0,0,0,0.4);
}
.sm-dist {
  background: rgba(7,8,15,0.85);
  color: #fff;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  padding: 2px 6px;
  border-radius: 4px;
  margin-top: 2px;
  white-space: nowrap;
}

/* Notifs (the existing showNotif) */
@media (max-width: 380px) {
  .tab { font-size: 12.5px; padding: 13px 2px; }
  .iwrap input { font-size: 14.5px; }
  .jdur { font-size: 24px; }
}
</style>
</head>

<header class="ovl ovl-tl">

<div id="rush-banner" class="ovl-banner hidden">

<script>
'use strict';

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let userPos = null;
let uMarker = null;
let rLayers = [];
let sMarkers = [];
let stopTimer = null;
let selStopId = null;
let tapActive = false;
let tapJourney = null;
let tapFromCoord = null;
let tapToCoord = null;
let sheetExpanded = false;
let optimizeFor = localStorage.getItem('talaria_opt') || 'fastest';
let favorites = JSON.parse(localStorage.getItem('talaria_favs') || '[]');
let incidents = JSON.parse(localStorage.getItem('talaria_inc') || '[]');
let prefs = JSON.parse(localStorage.getItem('talaria_prefs') || '{}');
let currentPage = 'home';
let fromCoordStored = null;
let stop2Id = null, stop2Name = null, stop2Timer = null, stop2Cd = null;

// ═══════════════════════════════════════

function clearMap() {
  rLayers.forEach(l => map.removeLayer(l)); rLayers = [];
  sMarkers.forEach(m => map.removeLayer(m)); sMarkers = [];
}

function centerUser() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(p => {
    const lat = p.coords.latitude, lon = p.coords.longitude;
    userPos = { lat, lon };
    map.setView([lat, lon], 15);
    if (uMarker) map.removeLayer(uMarker);
    uMarker = L.circleMarker([lat, lon], { radius: 9, fillColor: '#4488ff', fillOpacity: 1, color: '#fff', weight: 2.5 }).addTo(map);
  });
}

function drawRoute(j) {
  clearMap();
  const mc = { METRO: '#4488ff', RER: '#a855f7', BUS: '#ff6b35', TRAM: '#00d68f', RAIL: '#a855f7', WALK: 'rgba(238,238,255,.2)' };
  const sections = (j.sections || []).filter(s => s.geojson);
  const bounds = [];
  sections.forEach(s => {
    const mode = modeOf(s);
    const coords = s.geojson.coordinates.map(([a, b]) => [b, a]);
    bounds.push(...coords);
    const isWalk = mode === 'WALK';
    const color = mc[mode] || '#4488ff';
    if (!isWalk) { const sh = L.polyline(coords, { color: 'rgba(0,0,0,.4)', weight: 10, opacity: .4, lineCap: 'round' }).addTo(map); rLayers.push(sh); }
    const l = L.polyline(coords, { color, weight: isWalk ? 3 : 6, opacity: isWalk ? .3 : .95, dashArray: isWalk ? '5 9' : null, lineCap: 'round', lineJoin: 'round' }).addTo(map);
    rLayers.push(l);
    if (!isWalk) { const h = L.polyline(coords, { color, weight: 11, opacity: .15, dashArray: '10 10', lineCap: 'round', className: 'route-animated' }).addTo(map); rLayers.push(h); }
    if (!isWalk && coords[0]) { const d = L.circleMarker(coords[0], { radius: 5, fillColor: color, fillOpacity: 1, color: '#fff', weight: 2 }).addTo(map); rLayers.push(d); }
  });
  if (sections[0]?.geojson) {
    const c = sections[0].geojson.coordinates.map(([a, b]) => [b, a]);
    if (c[0]) { const m = L.circleMarker(c[0], { radius: 9, fillColor: '#4488ff', fillOpacity: 1, color: '#fff', weight: 2.5 }).bindTooltip('Départ', { permanent: true, direction: 'top', offset: [0, -12] }).addTo(map); rLayers.push(m); }
  }
  const ls = sections[sections.length - 1];
  if (ls?.geojson) {
    const c = ls.geojson.coordinates.map(([a, b]) => [b, a]);
    const last = c[c.length - 1];
    if (last) { const m = L.circleMarker(last, { radius: 9, fillColor: '#ff4757', fillOpacity: 1, color: '#fff', weight: 2.5 }).bindTooltip('Arrivée', { permanent: true, direction: 'top', offset: [0, -12] }).addTo(map); rLayers.push(m); }
  }
  if (bounds.length) map.fitBounds(bounds, { padding: [50, 30] });
}

function putStop(name, lat, lon) {
  sMarkers.forEach(m => map.removeLayer(m)); sMarkers = [];
  map.setView([lat, lon], 16);
  const m = L.circleMarker([lat, lon], { radius: 8, fillColor: '#00d68f', fillOpacity: 1, color: '#fff', weight: 2.5 }).bindPopup(`<b>${name}</b>`).addTo(map);
  sMarkers.push(m); m.openPopup();
}

// API

async function prim(path, params = {}) {
  const qs = new URLSearchParams({ path, ...params }).toString();
  const r = await fetch(`/api/prim?${qs}`);
  if (!r.ok) throw new Error(`Erreur API (${r.status})`);
  return r.json();
}

// Géocodage via API Adresse data.gouv.fr (BAN), proxifiée par /api/geocode.
// Format de réponse : GeoJSON FeatureCollection (features[].geometry.coordinates = [lon, lat])
async function geo(q) {
  const r = await fetch(`/api/geocode?op=search&limit=1&q=${encodeURIComponent(q)}`);
  if (!r.ok) throw new Error(`Erreur géocodage (${r.status})`);
  const d = await r.json();
  const f = (d.features || [])[0];
  if (!f) throw new Error(`Lieu introuvable : "${q}"`);
  const [lon, lat] = f.geometry.coordinates;
  return { lat, lon };
}

async function geoSug(q) {
  try {
    const r = await fetch(`/api/geocode?op=search&limit=5&q=${encodeURIComponent(q)}`);
    if (!r.ok) return [];
    const d = await r.json();
    return (d.features || []).map(f => {
      const [lon, lat] = f.geometry.coordinates;
      const p = f.properties || {};
      return {
        label: p.label || p.name || '',
        city:  p.city  || '',
        postcode: p.postcode || '',
        lat, lon,
      };
    });
  } catch (e) { return []; }
}

async function reverseGeo(lat, lon) {
  try {
    const r = await fetch(`/api/geocode?op=reverse&lat=${lat}&lon=${lon}`);
    if (!r.ok) throw new Error('reverse failed');
    const d = await r.json();
    const f = (d.features || [])[0];
    if (!f) return `${lat.toFixed(4)},${lon.toFixed(4)}`;
    const p = f.properties || {};
    return p.name || p.street || p.label || `${lat.toFixed(4)},${lon.toFixed(4)}`;
  } catch (e) { return `${lat.toFixed(4)},${lon.toFixed(4)}`; }
}

const s2m = s => { const m = Math.round(s / 60); return m < 60 ? `${m} min` : `${Math.floor(m / 60)}h${String(m % 60).padStart(2, '0')}`; };
const fmtT = dt => dt?.length >= 13 ? `${dt.slice(9, 11)}:${dt.slice(11, 13)}` : '';

function modeOf(s) {
  if (['street_network', 'walking', 'transfer'].includes(s.type)) return 'WALK';
  const m = (s.display_informations?.commercial_mode || '').toUpperCase();
  if (m.includes('TRAM')) return 'TRAM';
  if (m.includes('RER')) return 'RER';
  if (m.includes('MÉTRO') || m.includes('METRO')) return 'METRO';
  if (m.includes('RAIL') || m.includes('TRAIN') || m.includes('TRANS')) return 'RAIL';
  return 'BUS';
}

function getCrowd(line, hour) {
  // Estimation indicative — pas de données temps réel d'affluence côté PRIM public.
  // On affiche "estimé" pour ne pas tromper l'utilisateur.
  const rush = (hour >= 7 && hour <= 9) || (hour >= 17 && hour <= 19);
  const L = (line || '').toUpperCase().trim();
  // Lignes historiquement les plus chargées en pointe
  const heavyMetro = ['1','4','13','14'];
  const heavyRER   = ['A','B'];
  const isHeavy =
    heavyMetro.some(l => L === l || L === 'M'+l) ||
    heavyRER.some(l   => L === l || L === 'RER '+l);
  const dot = c => `<svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="${c}"/></svg>`;
  if (rush && isHeavy)  return { dot: dot('#ff4757'), label: 'Affluence élevée (estim.)', color: '#ff4757', score: 3 };
  if (rush || isHeavy)  return { dot: dot('#ff9f43'), label: 'Modérée (estim.)',           color: '#ff9f43', score: 2 };
  return                       { dot: dot('#00d68f'), label: 'Calme (estim.)',             color: '#00d68f', score: 1 };
}

function predictDelay() {
  // Désactivé : la version précédente retournait Math.random() — pas une prédiction.
  // Pour afficher un retard réel, il faudra croiser aimed_arrival_time vs
  // expected_arrival_time depuis les Stop Monitoring SIRI (PRIM /stop-monitoring).
  return 0;
}

function stressScore(j) {
  const t = j.nb_transfers ?? 0, w = Math.round((j.durations?.walking || 0) / 60);
  const h = new Date().getHours();
  return t * 20 + w * 2 + ((h >= 7 && h <= 9) || (h >= 17 && h <= 19) ? 15 : 0);
}

  if (key === 'from') fromCoordStored = null;
  clearTimeout(acTimers[key]);

function geoFrom() {
  if (!navigator.geolocation) return;
  const dot = document.getElementById('fromDot');
  dot.style.animation = 'pulse .7s ease infinite';
  navigator.geolocation.getCurrentPosition(async pos => {
    dot.style.animation = '';

    fromCoordStored = { lat, lon };
    const label = await reverseGeo(lat, lon);
    document.getElementById('from').value = (label && label.trim().length > 2) ? label : 'Ma position';
    map.setView([lat, lon], 14);
    if (uMarker) map.removeLayer(uMarker);
    uMarker = L.circleMarker([lat, lon], { radius: 9, fillColor: '#4488ff', fillOpacity: 1, color: '#fff', weight: 2.5 }).addTo(map);
    showNotif('pos', 'Position détectée', label, 2500);
  }, err => {
    dot.style.animation = '';
    const msgs = { 1: 'Accès refusé.', 2: 'Position non disponible.', 3: 'Délai dépassé.' };
    showNotif('off', 'Géolocalisation', msgs[err.code] || 'Erreur.');
  }, { enableHighAccuracy: true, timeout: 8000, maximumAge: 30000 });
}

window._journeys = [];

// Distance à vol d'oiseau en mètres
function distM(lat1,lon1,lat2,lon2){
  const R=6371000,dL=(lat2-lat1)*Math.PI/180,dO=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dO/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

// Carte statique du trajet à pied sur la carte
function drawWalkRoute(fc, tc) {
  clearMap();
  const coords = [[fc.lat, fc.lon],[tc.lat, tc.lon]];
  const l = L.polyline(coords, { color:'#00d68f', weight:4, dashArray:'6 10', lineCap:'round', opacity:.9 }).addTo(map);
  rLayers.push(l);
  const mA = L.circleMarker([fc.lat,fc.lon],{radius:9,fillColor:'#4488ff',fillOpacity:1,color:'#fff',weight:2.5}).bindTooltip('Départ',{permanent:true,direction:'top',offset:[0,-12]}).addTo(map);
  const mB = L.circleMarker([tc.lat,tc.lon],{radius:9,fillColor:'#ff4757',fillOpacity:1,color:'#fff',weight:2.5}).bindTooltip('Arrivée',{permanent:true,direction:'top',offset:[0,-12]}).addTo(map);
  rLayers.push(mA,mB);
  map.fitBounds([[fc.lat,fc.lon],[tc.lat,tc.lon]],{padding:[60,40]});
}

async function doRoute() {
  const fromVal = document.getElementById('from').value.trim();
  const toVal = document.getElementById('to').value.trim();
  const out = document.getElementById('route-out');
  const btn = document.getElementById('routeBtn');
  if (!fromVal || !toVal) { out.innerHTML = '<div class="err">Renseignez départ et arrivée.</div>'; return; }
  // Valider que les champs ne sont pas des placeholders vides type "."
  if (fromVal.length <= 1 && !fromCoordStored) { out.innerHTML = '<div class="err">Activez la géolocalisation (bouton •) ou saisissez un départ.</div>'; return; }
  btn.disabled = true;
  showSkeletons(out);
  document.getElementById('opt-pills').style.display = 'none';
  try {
    let fc = fromCoordStored;
    if (!fc) {
      if (fromVal.length <= 2) throw new Error('Départ invalide. Tapez • pour utiliser votre position.');
      fc = await geo(fromVal);
    }
    const tc = await geo(toVal);
    const dist = distM(fc.lat, fc.lon, tc.lat, tc.lon);
    const walkMin = Math.round(dist / 80); // ~80m/min à pied
    const bikeMin = Math.round(dist / 250); // ~250m/min à vélo

    // Récupérer les trajets en transport
    const data = await prim('journeys', { from: `${fc.lon};${fc.lat}`, to: `${tc.lon};${tc.lat}`, count: 5 });
    const journeys = data.journeys || [];
    const bestTransport = journeys.sort((a,b) => a.duration - b.duration)[0];
    const bestTransportMin = bestTransport ? Math.round(bestTransport.duration / 60) : Infinity;

    // Construire l'affichage
    let html = '<div class="jlist">';

    // Carte marche en premier si plus rapide ou distance < 2km
    if (dist <= 2000 || walkMin <= bestTransportMin) {
      const isWalkFastest = walkMin <= bestTransportMin;
      html += `<div class="jcard${isWalkFastest ? ' best' : ''}" id="jcwalk" onclick="event.currentTarget.classList.toggle('open');drawWalkRoute({lat:${fc.lat},lon:${fc.lon}},{lat:${tc.lat},lon:${tc.lon}})">
        <div class="jhead">
          <div>
            <div class="jdur">${walkMin} <span style="font-size:13px;font-weight:400;color:var(--ink2)">min</span></div>
            <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
              ${isWalkFastest ? '<span class="jbadge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Le plus rapide</span>' : ''}
              <span style="font-size:10px;color:var(--green);background:rgba(0,214,143,.12);padding:2px 8px;border-radius:99px;font-family:'JetBrains Mono',monospace;font-weight:600"><svg width="8" height="8" viewBox="0 0 8 8" style="flex-shrink:0"><circle cx="4" cy="4" r="4" fill="#00d68f"/></svg> 0 corresp.</span>
            </div>
          </div>
          <div class="jright">
            <div style="margin-bottom:4px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><circle cx="12" cy="5" r="1.5" fill="currentColor"/><path d="M9 19l1-5-2-3 3-4 2 3 3-1M16 19l-2-5"/></svg></div>
            <div style="font-size:13px;font-weight:600;color:var(--ink)">${dist < 1000 ? dist + 'm' : (dist/1000).toFixed(1) + 'km'}</div>
            <div style="font-size:11px;color:var(--green);margin-top:2px;font-weight:600">Zéro transport</div>
          </div>
        </div>
        <div class="jpills"><span class="pill WALK">↑ À pied</span>${bikeMin < walkMin ? '<span class="pill WALK">' + bikeMin + ' min vélo</span>' : ''}</div>
        <div class="jdetail">
          <div class="jdetail-inner" style="padding:4px 0">
            <div class="step"><div class="sicon WALK">↑</div><div><div class="sname">À pied jusqu'à destination</div><div class="ssub">${dist < 1000 ? dist + 'm' : (dist/1000).toFixed(1) + 'km'} — environ ${walkMin} min</div></div></div>
            <button class="btn btn-ghost" style="margin-top:10px;font-size:13px;padding:10px" onclick="event.stopPropagation();drawWalkRoute({lat:${fc.lat},lon:${fc.lon}},{lat:${tc.lat},lon:${tc.lon}});goPage('home');goPanel('map')" style="display:flex;align-items:center;justify-content:center;gap:6px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg> Voir sur la carte</button>
          </div>
        </div>
      </div>`;
    }

    // Ensuite les trajets en transport
    out.innerHTML = html + '</div>';
    renderJourneys(data, out, toVal, fc, tc, true /* append */);
    document.getElementById('opt-pills').style.display = 'flex';
    setSheetState('mid');
  } catch (e) {
    out.innerHTML = `<div class="err">${e.message}</div>`;
  }
  btn.disabled = false;
}

function renderJourneys(data, out, destName, fc, tc, append) {
  const hour = new Date().getHours();
  let list = (data.journeys || []).map(j => ({
    ...j,
    _crowd: getCrowd(j.sections?.find(s => s.display_informations)?.display_informations?.label, hour),
    _delay: predictDelay(j.sections?.find(s => s.display_informations)?.display_informations?.label, hour),
    _stress: stressScore(j)
  })).sort((a, b) => a.duration - b.duration);

  if (optimizeFor === 'stress') list.sort((a, b) => a._stress - b._stress);
  else if (optimizeFor === 'crowd') list.sort((a, b) => a._crowd.score - b._crowd.score);

  if (!list.length) { out.innerHTML = '<div class="err">Aucun itinéraire trouvé.</div>'; return; }
  window._journeys = list;

  const html = list.map((j, i) => {
    const sections = (j.sections || []).filter(s => s.type !== 'waiting');
    const pills = sections.map(s => {
      const mode = modeOf(s);
      if (mode === 'WALK' && s.duration < 90) return '';
      const code = s.display_informations?.label || s.display_informations?.code || '';
      return `<span class="pill ${mode}">${mode === 'WALK' ? '↑' : (code || mode)}</span>`;
    }).filter(Boolean).join('');

    const arr = fmtT(j.arrival_date_time), dep = fmtT(j.departure_date_time);
    const steps = sections.map(s => {
      if (s.type === 'waiting') return '';
      const mode = modeOf(s), code = s.display_informations?.label || '';
      const name = mode === 'WALK' ? `À pied — ${s2m(s.duration)}` : `${s.display_informations?.commercial_mode || mode} ${code}`.trim();
      const sub = mode !== 'WALK' && s.display_informations?.direction ? `Dir. ${s.display_informations.direction}` : (s.from?.name && s.to?.name ? `${s.from.name} → ${s.to.name}` : '');
      return `<div class="step"><div class="sicon ${mode}">${mode === 'WALK' ? '↑' : code.slice(0, 3) || '●'}</div><div><div class="sname">${name}</div>${sub ? `<div class="ssub">${sub}</div>` : ''}<div class="sdur">${s2m(s.duration)}</div></div></div>`;
    }).join('');

    const shareMsg = escQ(`J'arrive à ${arr} — ${s2m(j.duration)} depuis ${document.getElementById('from').value.trim()} vers ${destName} via Talaria`);
    const crowdStyle = `color:${j._crowd.color}`;

    return `<div class="jcard${i === 0 ? ' best' : ''}" id="jc${i}" onclick="toggleJ('jc${i}')">
      <div class="jhead">

async function doStop() {
  const q = document.getElementById('stopQ').value.trim();
  const out = document.getElementById('stop-out'), btn = document.getElementById('stopBtn');
  if (!q) { out.innerHTML = '<div class="err">Saisissez un nom d\'arrêt.</div>'; return; }
  if (stopTimer) { clearInterval(stopTimer); stopTimer = null; }
  btn.disabled = true;
  out.innerHTML = '<div class="loader"><div class="spin"></div>Recherche…</div>';
  try {
    let id = selStopId;
    if (!id) {
      const pd = await prim('places', { q, 'type[]': 'stop_area', count: 1 });
      const pl = (pd.places || []).find(p => p.embedded_type === 'stop_area');
      if (!pl) throw new Error(`Arrêt "${q}" introuvable.`);
      id = pl.stop_area?.id || pl.id;
      const coord = pl.stop_area || pl;
      if (coord.coord) putStop(q, coord.coord.lat, coord.coord.lon);
    }
    await loadDep(id, out, q);
    stopTimer = setInterval(() => loadDep(id, out, q), 30000);
  } catch (e) { out.innerHTML = `<div class="err">${e.message}</div>`; }
  btn.disabled = false;
}

// Marqueurs arrêts proches
let nearbyMarkers = [];
function clearNearby() { nearbyMarkers.forEach(m => map.removeLayer(m)); nearbyMarkers = []; }

function modeFromLines(stop) {
  const modes = (stop.commercial_modes || []).map(m => (m.name || '').toUpperCase());
  if (modes.some(m => m.includes('TRAM'))) return 'TRAM';
  if (modes.some(m => m.includes('RER'))) return 'RER';
  if (modes.some(m => m.includes('METRO') || m.includes('MÉTRO'))) return 'METRO';
  return 'BUS';
}

function placeNearbyMarkers(stops, uLat, uLon) {
  clearNearby();
  stops.forEach(stop => {
    const sLat = parseFloat(stop.coord?.lat || 0), sLon = parseFloat(stop.coord?.lon || 0);
    if (!sLat || !sLon) return;
    const dist = distM(uLat, uLon, sLat, sLon);
    const mode = modeFromLines(stop);
    const code = (stop.lines || [])[0]?.code || stop.name.slice(0, 2).toUpperCase();
    const icon = L.divIcon({
      className: '',
      html: `<div class="sm-wrap">
        <div class="sm-pin ${mode}">${code}</div>
        <div class="sm-needle"></div>
        <div class="sm-dist">${dist < 1000 ? dist + 'm' : (dist/1000).toFixed(1) + 'km'}</div>
      </div>`,
      iconSize: [50, 58], iconAnchor: [25, 58]
    });
    const m = L.marker([sLat, sLon], { icon })
      .addTo(map)
      .on('click', () => openStopPopup(stop.id || stop.stop_area_id, stop.name, uLat, uLon, dist));
    nearbyMarkers.push(m);
  });
}

async function openStopPopup(stopId, stopName, uLat, uLon, dist) {
  const ov = document.getElementById('stopPopupOv');
  const popup = document.getElementById('stopPopup');
  const body = document.getElementById('spopBody');
  document.getElementById('spopName').textContent = stopName;
  const distLabel = dist < 1000 ? dist + 'm' : (dist/1000).toFixed(1) + 'km';
  document.getElementById('spopDist').textContent = distLabel + ' · ~' + Math.round(dist/80) + ' min à pied';
  body.innerHTML = '<div class="loader"><div class="spin"></div>Chargement des passages…</div>';
  ov.classList.add('on'); popup.classList.add('on');
  try {
    const data = await prim(`stop_areas/${encodeURIComponent(stopId)}/departures`, { count: 15, duration: 5400 });
    renderDep(data, body, stopName, stopId);

    if (refbtn) refbtn.onclick = async () => {
      const data2 = await prim(`stop_areas/${encodeURIComponent(stopId)}/departures`, { count: 15, duration: 5400 });
      renderDep(data2, body, stopName, stopId);
    };
  } catch (e) { body.innerHTML = `<div class="err">${e.message}</div>`; }
}

function closeStopPopup() {
  document.getElementById('stopPopupOv').classList.remove('on');
  document.getElementById('stopPopup').classList.remove('on');
}

function doLocate() {
  const out = document.getElementById('stop-out'), lb = document.getElementById('locBtn');
  if (!navigator.geolocation) { out.innerHTML = '<div class="err">Géolocalisation non disponible.</div>'; return; }
  out.innerHTML = '<div class="loader"><div class="spin"></div>Localisation et recherche des arrêts…</div>';
  lb.style.color = 'var(--green)';
  navigator.geolocation.getCurrentPosition(async pos => {
    lb.style.color = '';
    const lat = pos.coords.latitude, lon = pos.coords.longitude;
    userPos = { lat, lon };

    // Centrer la carte sur l'utilisateur
    map.setView([lat, lon], 16);
    if (uMarker) map.removeLayer(uMarker);
    uMarker = L.circleMarker([lat, lon], { radius: 9, fillColor: '#4488ff', fillOpacity: 1, color: '#fff', weight: 2.5 }).addTo(map);

    // Basculer vers home pour voir la carte avec les marqueurs
    goPage('home');
    goPanel('stop');

    try {
      // Reverse geocode → nom de quartier → chercher arrêts proches
      const rv = await reverseGeo(lat, lon);
      // Chercher avec plusieurs termes pour maximiser les résultats
      let q = rv.split(',')[0].trim();
      // Si le terme est trop court ou générique, utiliser le quartier/ville
      if (q.length < 4) q = rv.split(',').slice(0, 2).join(' ').trim();
      if (q.length < 4) q = 'gare';
      let d;
      try {
        d = await prim('places', { q, 'type[]': 'stop_area', count: 8 });
        // Si pas de résultats, retry avec terme plus court
        if (!(d.places || []).filter(p => p.embedded_type === 'stop_area').length) {
          const q2 = q.split(' ').slice(-1)[0]; // dernier mot
          if (q2.length > 3) d = await prim('places', { q: q2, 'type[]': 'stop_area', count: 8 });
        }
      } catch(e) { d = { places: [] }; }
      const places = (d.places || []).filter(p => p.embedded_type === 'stop_area');
      if (!places.length) throw new Error('Aucun arrêt trouvé à proximité.');

      // Construire liste triée par distance
      const stops = places.map(p => {
        const sa = p.stop_area || p;
        return { ...sa, id: sa.id || p.id };
      }).filter(s => s.coord?.lat && s.coord?.lon)
        .sort((a, b) => distM(lat, lon, parseFloat(a.coord.lat), parseFloat(a.coord.lon)) - distM(lat, lon, parseFloat(b.coord.lat), parseFloat(b.coord.lon)));

      // Placer les marqueurs sur la carte
      placeNearbyMarkers(stops, lat, lon);

      // Afficher la liste dans le panel
      const closest = stops[0];
      const closestDist = distM(lat, lon, parseFloat(closest.coord.lat), parseFloat(closest.coord.lon));

      const listHtml = stops.map(s => {
        const sLat = parseFloat(s.coord.lat), sLon = parseFloat(s.coord.lon);
        const d2 = distM(lat, lon, sLat, sLon);
        const mode = modeFromLines(s);
        const modeIcons = {
        METRO: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/><path d="M9 6h6M9 10h6"/></svg>',
        RER:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M7 8V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/><circle cx="8.5" cy="14" r="1.5"/><circle cx="15.5" cy="14" r="1.5"/><path d="M8.5 16h7"/></svg>',
        TRAM:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="6" width="16" height="12" rx="2"/><path d="M4 12h16M8 6V4M16 6V4M8 18l-2 2M16 18l2 2"/><circle cx="8.5" cy="14.5" r="1"/><circle cx="15.5" cy="14.5" r="1"/></svg>',
        BUS:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6v6M3 6h18l1 12H2L3 6z"/><path d="M2 12h20"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>',
      };
        const lines = (s.lines || []).slice(0, 4).map(l => l.code || l.name).join(', ') || mode;
        return `<div class="nearby-card" onclick="openStopPopup('${s.id}','${s.name.replace(/'/g,"\'")}',${lat},${lon},${d2});document.getElementById('stopQ').value='${s.name.replace(/'/g,"\'")}';selStopId='${s.id}'">
          <div class="nearby-icon">${modeIcons[mode] || '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18M8 6V3M16 6V3"/></svg>'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</div>
            <div style="font-size:11px;color:var(--ink2);margin-top:2px">${lines}</div>
          </div>
          <div class="nearby-dist">${d2 < 1000 ? d2 + 'm' : (d2/1000).toFixed(1) + 'km'}<span>~${Math.round(d2/80)} min</span></div>
        </div>`;
      }).join('');

      out.innerHTML = `
        <div style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">
          ${stops.length} arrêts · Tap sur la carte ou sur un arrêt
        </div>
        ${listHtml}`;

      // Auto-ouvrir le plus proche
      await openStopPopup(closest.id, closest.name, lat, lon, closestDist);

    } catch (e) { out.innerHTML = `<div class="err">${e.message}</div>`; }

  }, () => { lb.style.color = ''; out.innerHTML = '<div class="err">Position inaccessible. Vérifiez les autorisations.</div>'; }, { enableHighAccuracy: true, timeout: 10000 });
}

async function loadDep(stopId, container, name) {
  try {
    const data = await prim(`stop_areas/${encodeURIComponent(stopId)}/departures`, { count: 20, duration: 7200 });
    renderDep(data, container, name, stopId);
  } catch (e) { container.innerHTML = `<div class="err">${e.message}</div>`; }
}

function renderDep(data, container, stopName, stopId) {
  const deps = data.departures || [];
  const now = new Date();
  const parseD = dt => dt?.length >= 15 ? new Date(+dt.slice(0, 4), +dt.slice(4, 6) - 1, +dt.slice(6, 8), +dt.slice(9, 11), +dt.slice(11, 13), +dt.slice(13, 15)) : null;
  const diffM = dt => { const d = parseD(dt); return d ? Math.round((d - now) / 60000) : null; };
  const fmtNext = dt => {
    const m = diffM(dt);
    if (m === null) return { l: '--', c: 'var(--ink3)' };
    if (m <= 0) return { l: 'Immédiat', c: 'var(--green)', a: true };
    if (m <= 2) return { l: `${m} min`, c: 'var(--green)', a: true };
    if (m <= 5) return { l: `${m} min`, c: 'var(--orange)' };
    return { l: fmtT(dt), c: 'var(--blue)' };
  };
  const modeI = info => {
    const m = (info.commercial_mode || '').toUpperCase();
    if (m.includes('TRAM')) return 'TRAM';
    if (m.includes('RER')) return 'RER';
    if (m.includes('MÉTRO') || m.includes('METRO')) return 'METRO';
    if (m.includes('RAIL') || m.includes('TRANS')) return 'RAIL';
    return 'BUS';
  };
  const lines = {};
  deps.forEach(d => {
    const info = d.display_informations || {};
    const key = `${info.label}_${info.direction}`;
    if (!lines[key]) lines[key] = { info, deps: [], stop: d.stop_point?.name || stopName };
    const dt = d.stop_date_time?.departure_date_time;
    if (dt) lines[key].deps.push(dt);
  });
  if (!Object.keys(lines).length) { container.innerHTML = '<div class="err">Aucun départ dans les 2h.</div>'; return; }
  const ts = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  let html = `<div class="dep-meta"><div><div class="dep-label">Prochains passages</div><div class="countdown" id="cdTimer">Màj ${ts} · 30s</div></div><button class="refbtn" onclick="loadDep('${stopId}',document.getElementById('stop-out'),'${stopName}')">↻</button></div><div class="deplist">`;
  Object.values(lines).sort((a, b) => (diffM(a.deps[0]) ?? 999) - (diffM(b.deps[0]) ?? 999)).forEach(line => {
    const mode = modeI(line.info), code = line.info.label || line.info.code || '?', dir = line.info.direction || code;
    const n1 = line.deps[0] ? fmtNext(line.deps[0]) : { l: '--', c: 'var(--ink3)' };
    const n2 = line.deps[1] ? fmtNext(line.deps[1]) : null;
    html += `<div class="depcard"><div class="depbadge ${mode}">${code}</div><div class="depinfo"><div class="depdir">${dir}</div><div class="depstop">${line.stop}</div></div><div class="deptimes"><div class="dept1" style="color:${n1.c};animation:${n1.a ? 'pulse 1.2s ease infinite' : 'none'}">${n1.l}</div>${n2 ? `<div class="dept2">${n2.l}</div>` : ''}</div></div>`;
  });
  html += '</div>';
  container.innerHTML = html;
  let secs = 30;
  const cdEl = document.getElementById('cdTimer');
  const cdI = setInterval(() => { secs--; if (cdEl) cdEl.textContent = `Màj ${ts} · ${secs}s`; if (secs <= 0) clearInterval(cdI); }, 1000);
}

// ═══════════════════════════════════════
function toggleTap() {
  tapActive = !tapActive;
  const btn = document.getElementById('tapBtn');
  btn.classList.toggle('on', tapActive);
  document.getElementById('tapHint').classList.toggle('on', tapActive);
  map.getContainer().style.cursor = tapActive ? 'crosshair' : '';
}

async function handleMapTap(lat, lng) {
  tapActive = false;
  document.getElementById('tapBtn').classList.remove('on');
  document.getElementById('tapHint').classList.remove('on');
  map.getContainer().style.cursor = '';

  // Marqueur destination
  const icon = L.divIcon({ className: '', html: `<div style="width:28px;height:28px;background:#ff4757;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 3px 12px rgba(255,71,87,.6)"></div>`, iconSize: [28, 28], iconAnchor: [14, 28] });
  if (tapToCoord?._marker) map.removeLayer(tapToCoord._marker);
  const m = L.marker([lat, lng], { icon }).addTo(map);

  // Afficher carte résultat
  const card = document.getElementById('tapCard');
  document.getElementById('tapDest').textContent = 'Calcul…';
  document.getElementById('tapDur').textContent = '…';
  document.getElementById('tapTimes').textContent = '';
  document.getElementById('tapArr').textContent = '';
  document.getElementById('tapPills').innerHTML = '';
  card.classList.add('on');

  // Reverse geocode
  const destLabel = await reverseGeo(lat, lng);
  document.getElementById('tapDest').textContent = destLabel;

  // Coordonnées de départ
  let fromLat, fromLon;
  if (fromCoordStored) { fromLat = fromCoordStored.lat; fromLon = fromCoordStored.lon; }
  else if (userPos) { fromLat = userPos.lat; fromLon = userPos.lon; }
  else {
    document.getElementById('tapDur').innerHTML = '<span style="font-size:13px;color:var(--red)">Activez la géoloc d\'abord</span>';
    return;
  }

  tapToCoord = { lat, lon: lng, _marker: m };
  tapFromCoord = { lat: fromLat, lon: fromLon };

  try {
    const data = await prim('journeys', { from: `${fromLon};${fromLat}`, to: `${lng};${lat}`, count: 3 });
    const best = (data.journeys || []).sort((a, b) => a.duration - b.duration)[0];
    if (!best) throw new Error('Aucun itinéraire.');
    tapJourney = best;
    document.getElementById('tapDur').innerHTML = s2m(best.duration).replace(' min', '') + '<span style="font-size:13px;font-weight:400;color:var(--ink2)"> min</span>';
    document.getElementById('tapTimes').textContent = `${fmtT(best.departure_date_time)} → ${fmtT(best.arrival_date_time)}`;
    document.getElementById('tapArr').textContent = `Arrivée ${fmtT(best.arrival_date_time)}`;
    const sections = (best.sections || []).filter(s => s.type !== 'waiting');
    const pills = sections.map(s => {
      const mode = modeOf(s);
      if (mode === 'WALK' && s.duration < 90) return '';
      const code = s.display_informations?.label || '';
      return `<span class="pill ${mode}">${mode === 'WALK' ? '↑' : (code || mode)}</span>`;
    }).filter(Boolean).join('');
    document.getElementById('tapPills').innerHTML = pills || '<span class="pill WALK">À pied</span>';
    drawRoute(best);
    // Remettre le marqueur destination (drawRoute efface tout)
    m.addTo(map);
  } catch (e) {
    document.getElementById('tapDur').innerHTML = `<span style="font-size:12px;color:var(--red)">${e.message}</span>`;
  }
}

function closeTap() {
  document.getElementById('tapCard').classList.remove('on');
  tapJourney = null;
  clearMap();
}

function tapToFull() {
  if (!tapFromCoord || !tapToCoord) return;
  fromCoordStored = tapFromCoord;
  reverseGeo(tapToCoord.lat, tapToCoord.lon).then(label => {
    document.getElementById('to').value = label;
    goPage('home'); goPanel('route');
    doRoute();
  });
  document.getElementById('tapCard').classList.remove('on');
}

// API 1 : OPEN-METEO — Météo temps réel + alertes impact
// https://open-meteo.com/  (gratuit, sans clé)
// ═══════════════════════════════════════════════════════════
let weatherData = null;

async function fetchWeather(lat, lon) {
  try {
    const r = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,precipitation,weathercode,windspeed_10m,rain` +
      `&hourly=precipitation_probability&forecast_days=1&timezone=Europe%2FParis`
    );
    const d = await r.json();
    weatherData = d.current;
    renderEnvBar();
    // Alerte pluie imminente
    const rain = d.current?.precipitation || 0;
    const rainProb = d.hourly?.precipitation_probability?.[new Date().getHours()] || 0;
    if (rain > 1 || rainProb > 70) {
      showNotif('warn', 'Pluie détectée', `${rain}mm · +${Math.round(rain * 3)} min sur votre trajet`);
    }
  } catch(e) {}
}

}

function getAqiLabel(aqi) {
  if (aqi <= 20) return { label:'Excellent', color:'#00d68f' };
  if (aqi <= 40) return { label:'Bon', color:'#00d68f' };
  if (aqi <= 60) return { label:'Moyen', color:'#ff9f43' };
  if (aqi <= 80) return { label:'Mauvais', color:'#ff4757' };
  return { label:'Très mauvais', color:'#ff4757' };
}

// ═══════════════════════════════════════════════════════════
// API 3 : IDFM OPEN DATA — Perturbations en cours
// https://data.iledefrance-mobilites.fr/  (gratuit, sans clé)
// ═══════════════════════════════════════════════════════════
let disruptions = [];

async function fetchDisruptions() {
  try {
    // Utilise l'API Navitia line_reports (incluse dans l'abonnement Calculateur que ta clé possède déjà).
    // Note : si tu actives plus tard "Messages Info Trafic - Requête globale" sur le portail PRIM,
    // tu pourras basculer sur path=disruptions_bulk/disruptions/v2 pour un payload plus complet.
    const r = await fetch('/api/prim?path=line_reports&count=25');
    if (!r.ok) throw new Error('disruptions ' + r.status);
    const d = await r.json();
    const raw = Array.isArray(d.disruptions) ? d.disruptions : [];
    disruptions = raw.slice(0, 20).map(x => {
      const sev = x.severity && (x.severity.name || x.severity.effect) || '';
      const cause = x.cause || '';
      const msg  = (x.messages && x.messages[0] && x.messages[0].text)
                 || cause || sev || 'Perturbation en cours';
      const lineLabel =
        (x.impacted_objects && x.impacted_objects[0] && x.impacted_objects[0].pt_object && x.impacted_objects[0].pt_object.name)
        || x.impacted_objects?.[0]?.pt_object?.line?.code
        || '';
      const time = x.updated_at || x.application_periods?.[0]?.begin || 'En cours';
      return {
        line: lineLabel,
        type: sev || cause || 'Perturbation',
        msg,
        time,
      };
    });
  } catch (e) {
    // Pas de fallback inventé : on n'affiche RIEN plutôt qu'une fausse info.
    disruptions = [];
  }
}

function renderDisruptions(container) {
  if (!disruptions.length) {
    container.innerHTML += '<div style="font-size:13px;color:var(--green);padding:8px 0;display:flex;align-items:center;gap:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Aucune perturbation signalée</div>';
    return;
  }
  disruptions.forEach(d => {
    const line = (d.line || '?').toString().slice(0, 4);
    const msg  = (d.msg || 'Perturbation en cours').toString();
    const time = (d.time || 'En cours').toString();
    const type = (d.type || 'Perturbation').toString();
    container.innerHTML += `<div class="disrupt-card">
      <div class="disrupt-line">${line}</div>
      <div class="disrupt-info">
        <div class="disrupt-title">${type}</div>
        <div class="disrupt-body">${msg.slice(0,160)}${msg.length>160?'…':''}</div>
        <div class="disrupt-time">${time}</div>
      </div>
    </div>`;
  });
}

// ═══════════════════════════════════════════════════════════
// API 4 : VÉLIB' MÉTROPOLE — GBFS officiel (gratuit, sans clé)
// https://velib-metropole-opendata.smoove.pro/  (proxifié via /api/velib)
// ═══════════════════════════════════════════════════════════
let velibMarkers = [];
let velibVisible = false;
let velibCache = null;     // { stations: [...], ts: number } — réutilisé entre vues
let velibCacheTs = 0;

async function fetchVelib(lat, lon, radius = 700) {
  // Le proxy mutualise via cache CDN 60s ; on garde aussi un petit cache
  // côté client pour éviter de re-fetch quand l'utilisateur bouge légèrement.
  const now = Date.now();
  if (!velibCache || now - velibCacheTs > 45000) {
    try {
      const r = await fetch('/api/velib');
      if (!r.ok) return [];
      velibCache = await r.json();
      velibCacheTs = now;
    } catch (e) { return []; }
  }
  const all = (velibCache && velibCache.stations) || [];
  // Filtrage par rayon haversine (distM est défini plus haut dans le fichier)
  return all
    .filter(s => s.renting && distM(lat, lon, s.lat, s.lon) <= radius)
    .sort((a, b) => distM(lat, lon, a.lat, a.lon) - distM(lat, lon, b.lat, b.lon))
    .slice(0, 25);
}

function showVelibOnMap(stations /*, uLat, uLon */) {
  velibMarkers.forEach(m => map.removeLayer(m));
  velibMarkers = [];
  stations.forEach(s => {
    const total = (s.mech || 0) + (s.ebike || 0);
    const color = total === 0 ? '#ff4757' : (total < 3 ? '#ff9f43' : '#00d68f');
    const icon = L.divIcon({
      className: '',
      html: `<div class="vlib-pin" style="background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700">${total}</div>`,
      iconSize: [30, 30], iconAnchor: [15, 15],
    });
    const m = L.marker([s.lat, s.lon], { icon })
      .addTo(map)
      .bindPopup(
        `<b style="color:#0d0d1a">${s.name}</b><br>` +
        `<span style="color:#0d0d1a;font-size:12px">` +
          `<b>${s.mech || 0}</b> méca · <b>${s.ebike || 0}</b> élec · <b>${s.docks || 0}</b> bornettes libres<br>` +
          `Capacité ${s.capacity || '?'}` +
        `</span>`
      );
    velibMarkers.push(m);
  });
  velibVisible = true;
}

function toggleVelib() {
  if (velibVisible) {
    velibMarkers.forEach(m => map.removeLayer(m));
    velibMarkers = [];
    velibVisible = false;
    const _vb1=document.getElementById('velibBtn');if(_vb1)_vb1.classList.remove('on');
  } else {
    const pos = userPos || { lat: 48.8566, lon: 2.3522 };
    const _vb2=document.getElementById('velibBtn');if(_vb2)_vb2.classList.add('on');
    fetchVelib(pos.lat, pos.lon).then(stations => {
      showVelibOnMap(stations, pos.lat, pos.lon);
      if (!stations.length) showNotif('warn', "Vélib'", 'Aucune station dans ce secteur');
    });
  }
}

// API 6 : IDFM PRIM — Accessibilité PMR des stations
// Ajout d'un indicateur accessibilité sur les arrêts
// ═══════════════════════════════════════════════════════════
const accessibilityCache = {};

async function fetchAccessibility(stopId) {
  if (accessibilityCache[stopId] !== undefined) return accessibilityCache[stopId];
  try {
    const data = await prim(`stop_areas/${encodeURIComponent(stopId)}`, {});
    const equip = data.stop_areas?.[0]?.equipments || [];
    const accessible = equip.includes('has_wheelchair_boarding') || equip.includes('has_elevated_platform');
    accessibilityCache[stopId] = accessible;
    return accessible;
  } catch(e) {
    accessibilityCache[stopId] = false;
    return false;
  }
}

// ════════════════════════════════════════════════════════════════════
// SHEET — drag & snap (peek / mid / full)
// ════════════════════════════════════════════════════════════════════
(function(){
  const sheet  = document.getElementById('sheet');
  const handle = document.getElementById('sheetHandle');
  if (!sheet || !handle) return;

  const STATES = ['peek', 'mid', 'full'];
  const HEIGHTS = () => ({
    peek: 96,
    mid:  Math.round(window.innerHeight * 0.52),
    full: Math.round(window.innerHeight * 0.92),
  });

  let dragging = false, startY = 0, startH = 0, didDrag = false;

  function onStart(e) {
    dragging = true; didDrag = false;
    sheet.classList.add('dragging');
    startY = (e.touches ? e.touches[0].clientY : e.clientY);
    startH = sheet.getBoundingClientRect().height;
    e.preventDefault();
  }
  function onMove(e) {
    if (!dragging) return;
    const y = (e.touches ? e.touches[0].clientY : e.clientY);
    const dy = startY - y;
    if (Math.abs(dy) > 4) didDrag = true;
    const newH = Math.max(80, Math.min(window.innerHeight * 0.95, startH + dy));
    sheet.style.height = newH + 'px';
  }
  function onEnd() {
    if (!dragging) return;
    dragging = false;
    sheet.classList.remove('dragging');
    if (!didDrag) {
      sheet.style.height = '';
      const cur = sheet.dataset.state;
      setSheetState(cur === 'peek' ? 'mid' : 'peek');
      return;
    }
    const h = sheet.getBoundingClientRect().height;
    const heights = HEIGHTS();
    let nearest = 'peek', bestDist = Infinity;
    for (const s of STATES) {
      const d = Math.abs(h - heights[s]);
      if (d < bestDist) { bestDist = d; nearest = s; }
    }
    sheet.style.height = '';
    setSheetState(nearest);
  }

  handle.addEventListener('touchstart', onStart, { passive: false });
  handle.addEventListener('mousedown',  onStart);
  window.addEventListener('touchmove',  onMove, { passive: true });
  window.addEventListener('mousemove',  onMove);
  window.addEventListener('touchend',   onEnd);
  window.addEventListener('mouseup',    onEnd);
})();

function setSheetState(state) {
  const sheet = document.getElementById('sheet');
  if (!sheet) return;
  if (!['peek','mid','full'].includes(state)) state = 'mid';
  sheet.dataset.state = state;
  setTimeout(() => { try { if (typeof map !== 'undefined' && map) map.invalidateSize(); } catch(e){} }, 380);
}

function switchTab(tab) {
  const valid = ['route','stop','alert','settings'];
  if (!valid.includes(tab)) tab = 'route';
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.querySelectorAll('.page').forEach(p => {
    p.classList.toggle('active', p.dataset.page === tab);
  });
  if (tab === 'alert' && typeof renderAlerts === 'function') renderAlerts();
  if (tab === 'settings' && typeof loadPrefsUI === 'function') loadPrefsUI();
  if (tab === 'route') renderFavoritesIfEmpty();
}

function renderFavoritesIfEmpty() {
  const out = document.getElementById('route-out');
  const fromV = (document.getElementById('from') || {}).value;
  const toV   = (document.getElementById('to')   || {}).value;
  if (!out) return;
  if ((fromV && fromV.trim()) || (toV && toV.trim())) return;
  if (out.dataset.calculated === '1') return;
  let html = '';
  if (Array.isArray(favorites) && favorites.length) {
    html += '<div class="block-title">Tes favoris</div><div class="favs">';
    html += favorites.map((f, i) => {
      const label = (f.to || 'Trajet').toString().replace(/'/g, "\\'");
      return '<button class="fav-chip" onclick="launchFav(' + i + ')"><span class="fav-star">\u2605</span>' + label + '</button>';
    }).join('');
    html += '</div>';
  }
  if (!html) {
    html = '<div class="empty-hint">Tape une destination ci-dessus, ou choisis un point sur la carte avec \u2295.</div>';
  }
  out.innerHTML = html;
}

const _origRenderJourneys = (typeof renderJourneys === 'function') ? renderJourneys : null;
if (_origRenderJourneys) {
  window.renderJourneys = function() {
    const r = _origRenderJourneys.apply(this, arguments);
    const out = document.getElementById('route-out');
    if (out) out.dataset.calculated = '1';
    return r;
  };
}

document.addEventListener('DOMContentLoaded', () => {
  const f = document.getElementById('from');
  const t = document.getElementById('to');
  [f, t].forEach(el => el && el.addEventListener('input', () => {
    const out = document.getElementById('route-out');
    if (out) out.dataset.calculated = '';
  }));
  renderFavoritesIfEmpty();
});

function updateAlertBadge() {
  const b = document.getElementById('alertBadge');
  if (!b) return;
  const has = (typeof disruptions !== 'undefined') && Array.isArray(disruptions) && disruptions.length > 0;
  b.classList.toggle('on', has);
}
const _origFetchDisruptions = (typeof fetchDisruptions === 'function') ? fetchDisruptions : null;
if (_origFetchDisruptions) {
  window.fetchDisruptions = async function() {
    const r = await _origFetchDisruptions.apply(this, arguments);
    updateAlertBadge();
    return r;
  };
}

function loadPrefsUI() {
  if (typeof prefs === 'undefined') return;
  const h = document.getElementById('homeAddr');

  if (h && prefs.home) h.value = prefs.home;
  if (w && prefs.work) w.value = prefs.work;
}
