<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="description" content="Talaria · Calculateur de trajet et prochains passages en temps réel — Île-de-France"/>
<meta property="og:title" content="Talaria · Transport IDF"/>
<meta property="og:description" content="Voyagez mieux en Île-de-France"/>
<title>Talaria</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c26;
  --border:#2a2a3a;
  --border2:#383850;
  --ink:#f0f0f8;
  --ink2:#9090a8;
  --ink3:#555568;
  --accent:#4f8ef7;
  --accent-dim:#1a2d55;
  --green:#22c55e;
  --green-dim:#0f2d1a;
  --red:#ef4444;
  --red-dim:#2d0f0f;
  --orange:#f97316;
  --metro:#4f8ef7;
  --rer:#a855f7;
  --bus:#f97316;
  --tram:#22c55e;
  --rail:#ef4444;
  --r:12px;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}

html,body{height:100%;background:var(--bg);font-family:'Syne',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── LAYOUT ── */
.app{height:100vh;display:grid;grid-template-rows:1fr auto}

/* ── MAP ── */
#map{
  width:100%;height:100%;
  background:var(--bg);
  z-index:1;
}
.leaflet-tile-pane{filter:brightness(.85) saturate(.7) hue-rotate(180deg) invert(1)}
.leaflet-control-attribution{display:none}

/* ── BOTTOM SHEET ── */
.sheet-wrap{
  position:relative;z-index:10;
  background:var(--surface);
  border-top:1px solid var(--border);
  max-height:72vh;
  display:flex;flex-direction:column;
}

.sheet-handle{
  width:36px;height:4px;background:var(--border2);border-radius:2px;
  margin:10px auto 0;flex-shrink:0;
}

/* ── TABS ── */
.tabs{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tab{
  padding:12px 0 10px;text-align:center;
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink3);cursor:pointer;border:none;background:none;
  font-family:'Syne',sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:color .15s;
}
.tab svg{width:18px;height:18px;stroke-width:1.8}
.tab.active{color:var(--accent)}
.tab.active svg{stroke:var(--accent)}

/* ── PANELS ── */
.panel{display:none;flex:1;overflow-y:auto;overscroll-behavior:contain}
.panel.active{display:block}

.panel-inner{padding:14px 14px 20px}

/* ── INPUTS ── */
.field-group{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.field-row{display:flex;align-items:center;gap:8px}
.field-dot{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;font-family:'DM Mono',monospace;
}
.field-dot.a{background:var(--accent-dim);color:var(--accent)}
.field-dot.b{background:var(--red-dim);color:var(--red)}
.field-dot.line{width:28px;display:flex;justify-content:center}
.field-dot.line::before{content:'';width:2px;height:16px;background:var(--border2);border-radius:2px}
.field-wrap{flex:1;position:relative}

input[type=text]{
  width:100%;padding:10px 13px;
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--r);font-family:'Syne',sans-serif;font-size:14px;
  color:var(--ink);outline:none;transition:border-color .15s;
  -webkit-appearance:none;
}
input[type=text]:focus{border-color:var(--accent)}
input::placeholder{color:var(--ink3)}

.btn-swap{
  width:32px;height:32px;border:1px solid var(--border);background:var(--surface2);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;color:var(--ink2);
  transition:background .15s;
}
.btn-swap:active{background:var(--border)}

.btn-primary{
  width:100%;padding:13px;
  background:var(--accent);color:#fff;border:none;
  border-radius:var(--r);font-family:'Syne',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  letter-spacing:.03em;transition:opacity .15s;
}
.btn-primary:active{opacity:.8}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}

/* ── AUTOCOMPLETE ── */
.ac{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r);overflow:hidden;
  box-shadow:0 12px 32px rgba(0,0,0,.5);
  max-height:180px;overflow-y:auto;
}
.ac-item{
  padding:10px 13px;font-size:13px;cursor:pointer;
  border-bottom:1px solid var(--border);color:var(--ink2);
  transition:background .1s;
}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:var(--border)}
.ac-item strong{color:var(--ink)}

/* ── JOURNEY CARDS ── */
.journey-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}

.journey-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;cursor:pointer;
  transition:border-color .15s;
}
.journey-card.best{border-color:var(--accent)}
.journey-card:active{opacity:.85}

.journey-head{padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.journey-dur{font-size:28px;font-weight:700;letter-spacing:-.04em;line-height:1}
.journey-dur span{font-size:12px;font-weight:400;color:var(--ink2);margin-left:2px}
.journey-right{text-align:right}
.journey-time{font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);font-weight:500}
.journey-transfers{font-size:11px;color:var(--ink3);margin-top:3px}
.best-tag{
  display:inline-block;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:var(--accent);color:#fff;padding:2px 7px;border-radius:99px;margin-top:5px;
}
.journey-pills{padding:0 14px 12px;display:flex;flex-wrap:wrap;gap:5px}

.pill{
  padding:4px 10px;border-radius:99px;
  font-size:11px;font-weight:700;font-family:'DM Mono',monospace;
  color:#fff;letter-spacing:.02em;
}
.pill.METRO{background:var(--metro)}
.pill.RER,.pill.RAIL{background:var(--rer)}
.pill.BUS{background:var(--bus)}
.pill.TRAM{background:var(--tram)}
.pill.WALK{background:transparent;color:var(--ink3);border:1px solid var(--border2);font-size:10px}

/* DETAIL */
.journey-detail{display:none;border-top:1px solid var(--border);padding:12px 14px}
.journey-card.open .journey-detail{display:block}
.step{display:grid;grid-template-columns:30px 1fr;gap:10px;padding:5px 0;position:relative}
.step:not(:last-child)::before{content:'';position:absolute;left:14px;top:30px;bottom:-5px;width:2px;background:var(--border)}
.step-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;color:#fff;flex-shrink:0}
.step-icon.METRO{background:var(--metro)}
.step-icon.RER,.step-icon.RAIL{background:var(--rer)}
.step-icon.BUS{background:var(--bus)}
.step-icon.TRAM{background:var(--tram)}
.step-icon.WALK{background:var(--border2);color:var(--ink2)}
.step-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3}
.step-sub{font-size:11px;color:var(--ink2);margin-top:2px}
.step-dur{font-size:10px;font-family:'DM Mono',monospace;color:var(--ink3);margin-top:3px}

/* ── DEPARTURES ── */
.dep-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.dep-title{font-size:13px;font-weight:600;color:var(--ink2);letter-spacing:.04em;text-transform:uppercase}
.dep-refresh{font-size:11px;font-family:'DM Mono',monospace;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;background:var(--accent-dim)}

.dep-list{display:flex;flex-direction:column;gap:6px}
.dep-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:11px 13px;
  display:flex;align-items:center;gap:11px;
}
.dep-badge{
  width:40px;height:40px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;font-family:'DM Mono',monospace;
  color:#fff;flex-shrink:0;
}
.dep-badge.METRO{background:var(--metro)}
.dep-badge.RER,.dep-badge.RAIL{background:var(--rer)}
.dep-badge.BUS{background:var(--bus)}
.dep-badge.TRAM{background:var(--tram)}
.dep-info{flex:1;min-width:0}
.dep-dir{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dep-stop{font-size:11px;color:var(--ink2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dep-times{flex-shrink:0;text-align:right}
.dep-t1{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)}
.dep-t1.now{color:var(--green)}
.dep-t1.soon{color:var(--orange)}
.dep-t2{font-size:10px;font-family:'DM Mono',monospace;color:var(--ink3);margin-top:2px}

.stop-row{display:flex;gap:8px;margin-bottom:10px}
.stop-row input{flex:1}
.btn-loc{
  width:42px;height:42px;border:1.5px solid var(--border);background:var(--surface2);
  border-radius:var(--r);display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;color:var(--accent);
}
.btn-loc:active{background:var(--border)}

/* ── MAP CONTROLS ── */
.map-controls{
  position:absolute;top:calc(12px + var(--st));right:12px;z-index:5;
  display:flex;flex-direction:column;gap:8px;
}
.map-btn{
  width:38px;height:38px;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--ink);font-size:18px;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.map-btn:active{background:var(--surface2)}

/* ── STATES ── */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:36px 20px;text-align:center;
}
.empty svg{opacity:.2}
.empty p{font-size:13px;color:var(--ink3);max-width:220px;line-height:1.6}

.loader{display:flex;align-items:center;gap:10px;padding:20px 14px;color:var(--ink2);font-size:13px}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.err-box{
  background:var(--red-dim);border:1px solid rgba(239,68,68,.3);
  border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--red);
  margin:8px 0;
}

/* ── MAP MARKERS CUSTOM ── */
.stop-marker{
  width:10px;height:10px;background:var(--ink2);border:2px solid var(--bg);
  border-radius:50%;
}
.vehicle-marker{
  width:14px;height:14px;border-radius:50%;border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;
}

/* ── ROUTE ON MAP ── */
</style>
</head>
<body>
<div class="app">

  <!-- MAP -->
  <div style="position:relative;flex:1">
    <div id="map"></div>
    <!-- Wordmark -->
    <div style="position:absolute;top:calc(12px + var(--st));left:14px;z-index:5;pointer-events:none">
      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:-.02em;text-shadow:0 2px 8px rgba(0,0,0,.7)">
        talaria
        <span style="font-size:9px;font-family:'DM Mono',monospace;font-weight:400;color:rgba(255,255,255,.45);letter-spacing:.12em;text-transform:uppercase;vertical-align:middle;margin-left:4px">idf</span>
      </div>
    </div>

    <div class="map-controls">
      <button class="map-btn" onclick="centerOnUser()" title="Ma position">◎</button>
      <button class="map-btn" onclick="clearMap()" title="Effacer">✕</button>
    </div>
  </div>

  <!-- BOTTOM SHEET -->
  <div class="sheet-wrap">
    <div class="sheet-handle"></div>

    <div class="tabs">
      <button class="tab active" id="tab-route" onclick="switchTab('route')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 17l4-8 4 4 4-6 4 10" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Trajet
      </button>
      <button class="tab" id="tab-stop" onclick="switchTab('stop')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18M8 6V3M16 6V3" stroke-linecap="round"/></svg>
        Arrêt
      </button>
      <button class="tab" id="tab-map" onclick="switchTab('map')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="10" r="4"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke-linecap="round"/></svg>
        Carte
      </button>
    </div>

    <!-- PANEL TRAJET -->
    <div class="panel active" id="panel-route">
      <div class="panel-inner">
        <div class="field-group">
          <div class="field-row">
            <div class="field-dot a">A</div>
            <div class="field-wrap">
              <input type="text" id="from" placeholder="Départ" autocomplete="off" oninput="acRoute(this,'from')"/>
              <div class="ac" id="ac-from" style="display:none"></div>
            </div>
            <button class="btn-swap" onclick="swapRoute()">⇅</button>
          </div>
          <div class="field-row">
            <div class="field-dot line"></div>
            <div style="flex:1"></div>
            <div style="width:32px"></div>
          </div>
          <div class="field-row">
            <div class="field-dot b">B</div>
            <div class="field-wrap">
              <input type="text" id="to" placeholder="Arrivée" autocomplete="off" oninput="acRoute(this,'to')"/>
              <div class="ac" id="ac-to" style="display:none"></div>
            </div>
            <div style="width:32px"></div>
          </div>
        </div>
        <button class="btn-primary" id="routeBtn" onclick="searchRoute()">Calculer le trajet →</button>
        <div id="route-results"></div>
      </div>
    </div>

    <!-- PANEL ARRÊT -->
    <div class="panel" id="panel-stop">
      <div class="panel-inner">
        <div class="stop-row">
          <div class="field-wrap" style="flex:1">
            <input type="text" id="stop-q" placeholder="Nom de l'arrêt…" autocomplete="off" oninput="acStop(this)"/>
            <div class="ac" id="ac-stop" style="display:none"></div>
          </div>
          <button class="btn-loc" onclick="locateStop()" title="Arrêt le plus proche">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke-linecap="round"/></svg>
          </button>
        </div>
        <button class="btn-primary" id="stopBtn" onclick="searchStop()">Voir les passages →</button>
        <div id="stop-results" style="margin-top:14px"></div>
      </div>
    </div>

    <!-- PANEL CARTE -->
    <div class="panel" id="panel-map">
      <div class="panel-inner">
        <div class="empty">
          <svg width="44" height="44" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="18" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M22 4C13.16 4 6 11.16 6 18c0 9.63 16 26 16 26s16-14.37 16-26c0-6.84-3.13-13-9-16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <p>Recherchez un trajet ou un arrêt pour voir les données sur la carte.</p>
          <button class="btn-primary" style="margin-top:8px" onclick="centerOnUser()">📍 Me localiser</button>
          <p style="font-size:10px;color:var(--ink3);margin-top:16px;font-family:'DM Mono',monospace">talaria · © OpenStreetMap · IDFM</p>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG — Talaria
// ═══════════════════════════════════════
// En production Vercel, le proxy est /api/prim
// En local, on peut utiliser directement l'API PRIM (avec jeton localStorage de dev)
const IS_VERCEL = window.location.hostname !== 'localhost' && !window.location.hostname.includes('127.');
const PROXY = '/api/prim';
const PRIM_BASE = 'https://prim.iledefrance-mobilites.fr/marketplace/v2/navitia';

async function primFetch(path, params = {}) {
  if (IS_VERCEL) {
    const qs = new URLSearchParams({ path, ...params }).toString();
    const r = await fetch(`${PROXY}?${qs}`);
    if (!r.ok) throw new Error(`Erreur API (${r.status})`);
    return r.json();
  } else {
    // Mode dev local : jeton en localStorage
    const tok = localStorage.getItem('prim_token') || '';
    const qs = new URLSearchParams(params).toString();
    const url = `${PRIM_BASE}/${path}${qs ? '?' + qs : ''}`;
    const r = await fetch(url, { headers: { apiKey: tok } });
    if (!r.ok) throw new Error(`Erreur API (${r.status})`);
    return r.json();
  }
}

// ═══════════════════════════════════════
// MAP
// ═══════════════════════════════════════
const map = L.map('map', {
  center: [48.8566, 2.3522],
  zoom: 13,
  zoomControl: false,
  attributionControl: false
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let userMarker = null;
let routeLayer = null;
let stopMarkers = [];
let vehicleMarkers = [];

function clearMap() {
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  stopMarkers.forEach(m => map.removeLayer(m)); stopMarkers = [];
  vehicleMarkers.forEach(m => map.removeLayer(m)); vehicleMarkers = [];
}

function centerOnUser() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    map.setView([lat, lng], 15);
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker([lat, lng], {
      radius: 8, fillColor: '#4f8ef7', fillOpacity: 1,
      color: '#fff', weight: 2
    }).addTo(map);
  });
}

function drawRoute(journey) {
  clearMap();
  const sections = (journey.sections || []).filter(s => s.geojson);
  if (!sections.length) return;

  const modeColor = m => ({
    METRO: '#4f8ef7', RER: '#a855f7', BUS: '#f97316',
    TRAM: '#22c55e', RAIL: '#ef4444', WALK: '#555568'
  })[m] || '#555568';

  const bounds = [];
  sections.forEach(s => {
    const mode = modeOf(s);
    const coords = s.geojson.coordinates.map(([lng, lat]) => [lat, lng]);
    bounds.push(...coords);
    L.polyline(coords, {
      color: modeColor(mode),
      weight: mode === 'WALK' ? 2 : 4,
      opacity: mode === 'WALK' ? 0.4 : 0.9,
      dashArray: mode === 'WALK' ? '6 6' : null
    }).addTo(map);
  });

  if (bounds.length) map.fitBounds(bounds, { padding: [30, 30] });
  switchTab('map');
}

function drawStopOnMap(name, lat, lng) {
  map.setView([lat, lng], 16);
  stopMarkers.forEach(m => map.removeLayer(m));
  stopMarkers = [];
  const m = L.circleMarker([lat, lng], {
    radius: 7, fillColor: '#22c55e', fillOpacity: 1,
    color: '#fff', weight: 2
  }).bindPopup(name).addTo(map);
  stopMarkers.push(m);
  m.openPopup();
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
let stopRefreshTimer = null;

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name !== 'stop' && stopRefreshTimer) { clearInterval(stopRefreshTimer); stopRefreshTimer = null; }
  setTimeout(() => map.invalidateSize(), 50);
}

// ═══════════════════════════════════════
// GEOCODE
// ═══════════════════════════════════════
async function geocode(q) {
  const r = await fetch(
    `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q + ', Île-de-France')}&accept-language=fr`,
    { headers: { 'User-Agent': 'TransportIDF/1.0' } }
  );
  const d = await r.json();
  if (!d.length) throw new Error(`Lieu introuvable : "${q}"`);
  return { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon) };
}

async function geoSug(q) {
  const r = await fetch(
    `https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(q + ', Île-de-France')}&accept-language=fr`,
    { headers: { 'User-Agent': 'TransportIDF/1.0' } }
  );
  return r.json();
}

// ═══════════════════════════════════════
// AUTOCOMPLETE
// ═══════════════════════════════════════
const acTimers = {};

function acRoute(inp, key) {
  clearTimeout(acTimers[key]);
  const q = inp.value.trim();
  const list = document.getElementById('ac-' + key);
  if (q.length < 3) { list.style.display = 'none'; return; }
  acTimers[key] = setTimeout(async () => {
    const res = await geoSug(q).catch(() => []);
    if (!res.length) { list.style.display = 'none'; return; }
    list.innerHTML = res.map(r => {
      const n = r.display_name.split(',').slice(0, 2).join(', ');
      return `<div class="ac-item" onclick="pickRoute('${key}','${n.replace(/'/g, "\\'")}')"><strong>${n}</strong></div>`;
    }).join('');
    list.style.display = 'block';
  }, 400);
}

function pickRoute(key, val) {
  document.getElementById(key).value = val;
  document.getElementById('ac-' + key).style.display = 'none';
}

let acStopTimer, selectedStopId = null;
function acStop(inp) {
  clearTimeout(acStopTimer);
  const q = inp.value.trim();
  if (q.length < 3) { document.getElementById('ac-stop').style.display = 'none'; return; }
  acStopTimer = setTimeout(async () => {
    try {
      const d = await primFetch('coverage/idfm/places', { q, 'type[]': 'stop_area', count: 6 });
      const places = (d.places || []).filter(p => p.embedded_type === 'stop_area');
      const list = document.getElementById('ac-stop');
      if (!places.length) { list.style.display = 'none'; return; }
      list.innerHTML = places.map(p => {
        const n = p.stop_area?.name || p.name;
        const id = p.stop_area?.id || p.id;
        const coord = p.stop_area || p;
        return `<div class="ac-item" onclick="pickStop('${n.replace(/'/g, "\\'")}','${id}',${coord.coord?.lat||0},${coord.coord?.lon||0})"><strong>${n}</strong></div>`;
      }).join('');
      list.style.display = 'block';
    } catch (e) {}
  }, 350);
}

function pickStop(name, id, lat, lng) {
  document.getElementById('stop-q').value = name;
  document.getElementById('ac-stop').style.display = 'none';
  selectedStopId = id;
  if (lat && lng) drawStopOnMap(name, lat, lng);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.field-wrap') && !e.target.closest('.stop-row'))
    document.querySelectorAll('.ac').forEach(a => a.style.display = 'none');
});

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
const s2m = s => { const m = Math.round(s / 60); return m < 60 ? `${m} min` : `${Math.floor(m / 60)}h${String(m % 60).padStart(2, '0')}`; };
const fmtT = dt => dt && dt.length >= 13 ? `${dt.slice(9, 11)}:${dt.slice(11, 13)}` : '';

function modeOf(s) {
  if (['street_network', 'walking', 'transfer'].includes(s.type)) return 'WALK';
  const m = (s.display_informations?.commercial_mode || '').toUpperCase();
  if (m.includes('TRAM')) return 'TRAM';
  if (m.includes('RER')) return 'RER';
  if (m.includes('MÉTRO') || m.includes('METRO')) return 'METRO';
  if (m.includes('RAIL') || m.includes('TRAIN') || m.includes('TRANS')) return 'RAIL';
  return 'BUS';
}

// ═══════════════════════════════════════
// SEARCH ROUTE
// ═══════════════════════════════════════
function swapRoute() {
  const f = document.getElementById('from'), t = document.getElementById('to');
  [f.value, t.value] = [t.value, f.value];
}

async function searchRoute() {
  const from = document.getElementById('from').value.trim();
  const to = document.getElementById('to').value.trim();
  const res = document.getElementById('route-results');
  const btn = document.getElementById('routeBtn');
  if (!from || !to) { res.innerHTML = `<div class="err-box">Renseignez départ et arrivée.</div>`; return; }
  btn.disabled = true;
  res.innerHTML = `<div class="loader"><div class="spin"></div>Calcul en cours…</div>`;
  try {
    const [fc, tc] = await Promise.all([geocode(from), geocode(to)]);
    const data = await primFetch('coverage/idfm/journeys', {
      from: `${fc.lon};${fc.lat}`,
      to: `${tc.lon};${tc.lat}`,
      count: 5
    });
    renderRoutes(data, res);
  } catch (e) {
    res.innerHTML = `<div class="err-box">${e.message}</div>`;
  } finally { btn.disabled = false; }
}

function renderRoutes(data, container) {
  const journeys = (data.journeys || []).sort((a, b) => a.duration - b.duration);
  if (!journeys.length) { container.innerHTML = `<div class="err-box">Aucun itinéraire trouvé.</div>`; return; }

  let html = `<div class="journey-list">`;
  journeys.forEach((j, i) => {
    const sections = (j.sections || []).filter(s => s.type !== 'waiting');
    const pills = sections.map(s => {
      const mode = modeOf(s);
      if (mode === 'WALK' && s.duration < 120) return '';
      const code = s.display_informations?.label || s.display_informations?.code || '';
      return `<span class="pill ${mode}">${mode === 'WALK' ? '🚶' : (code || mode)}</span>`;
    }).filter(Boolean).join('');

    const steps = sections.map(s => {
      if (s.type === 'waiting') return '';
      const mode = modeOf(s);
      const code = s.display_informations?.label || '';
      const name = mode === 'WALK' ? `À pied — ${s2m(s.duration)}` : `${s.display_informations?.commercial_mode || mode} ${code}`.trim();
      const sub = mode !== 'WALK' && s.display_informations?.direction ? `Dir. ${s.display_informations.direction}` : (s.from?.name && s.to?.name ? `${s.from.name} → ${s.to.name}` : '');
      return `<div class="step">
        <div class="step-icon ${mode}">${mode === 'WALK' ? '↑' : code.slice(0, 3) || '●'}</div>
        <div>
          <div class="step-name">${name}</div>
          ${sub ? `<div class="step-sub">${sub}</div>` : ''}
          <div class="step-dur">${s2m(s.duration)}</div>
        </div>
      </div>`;
    }).join('');

    // Index pour accéder à la journey depuis le bouton carte
    html += `<div class="journey-card${i === 0 ? ' best' : ''}" data-idx="${i}" onclick="toggleJourney(this,${i})">
      <div class="journey-head">
        <div>
          <div class="journey-dur">${s2m(j.duration).replace(' min', '<span> min</span>')}</div>
          ${i === 0 ? `<span class="best-tag">✓ Le plus rapide</span>` : ''}
        </div>
        <div class="journey-right">
          <div class="journey-time">${fmtT(j.departure_date_time)} → ${fmtT(j.arrival_date_time)}</div>
          <div class="journey-transfers">${j.nb_transfers ?? 0} correspondance${(j.nb_transfers ?? 0) !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <div class="journey-pills">${pills || '<span class="pill WALK">🚶 À pied</span>'}</div>
      <div class="journey-detail">${steps}
        <button class="btn-primary" style="margin-top:12px;font-size:12px;padding:9px" onclick="event.stopPropagation();showOnMap(${i})">🗺 Voir sur la carte</button>
      </div>
    </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;

  // Stocker les journeys pour la carte
  window._journeys = data.journeys.sort((a, b) => a.duration - b.duration);
}

function toggleJourney(el) { el.classList.toggle('open'); }

function showOnMap(idx) {
  if (!window._journeys || !window._journeys[idx]) return;
  drawRoute(window._journeys[idx]);
}

// ═══════════════════════════════════════
// SEARCH STOP
// ═══════════════════════════════════════
async function searchStop() {
  const q = document.getElementById('stop-q').value.trim();
  const res = document.getElementById('stop-results');
  const btn = document.getElementById('stopBtn');
  if (!q) { res.innerHTML = `<div class="err-box">Saisissez un nom d'arrêt.</div>`; return; }
  if (stopRefreshTimer) { clearInterval(stopRefreshTimer); stopRefreshTimer = null; }
  btn.disabled = true;
  res.innerHTML = `<div class="loader"><div class="spin"></div>Recherche…</div>`;
  try {
    let id = selectedStopId;
    if (!id) {
      const pd = await primFetch('coverage/idfm/places', { q, 'type[]': 'stop_area', count: 1 });
      const pl = (pd.places || []).find(p => p.embedded_type === 'stop_area');
      if (!pl) throw new Error(`Arrêt "${q}" introuvable.`);
      id = pl.stop_area?.id || pl.id;
      const coord = pl.stop_area || pl;
      if (coord.coord) drawStopOnMap(q, coord.coord.lat, coord.coord.lon);
    }
    await loadDepartures(id, res, q);
    stopRefreshTimer = setInterval(() => loadDepartures(id, res, q), 30000);
  } catch (e) {
    res.innerHTML = `<div class="err-box">${e.message}</div>`;
  } finally { btn.disabled = false; }
}

async function loadDepartures(stopId, container, name) {
  try {
    const data = await primFetch(`coverage/idfm/stop_areas/${encodeURIComponent(stopId)}/departures`, { count: 20, duration: 7200 });
    renderDepartures(data, container, name, stopId);
  } catch (e) {
    container.innerHTML = `<div class="err-box">${e.message}</div>`;
  }
}

function renderDepartures(data, container, stopName, stopId) {
  const deps = data.departures || [];
  const now = new Date();
  const parseD = dt => { if (!dt || dt.length < 15) return null; return new Date(+dt.slice(0,4),+dt.slice(4,6)-1,+dt.slice(6,8),+dt.slice(9,11),+dt.slice(11,13),+dt.slice(13,15)); };
  const diffM = dt => { const d = parseD(dt); return d ? Math.round((d - now) / 60000) : null; };
  const fmtNext = dt => {
    const m = diffM(dt);
    if (m === null) return { label: '--', cls: '' };
    if (m <= 0) return { label: 'Imm.', cls: 'now' };
    if (m <= 2) return { label: `${m} min`, cls: 'now' };
    if (m <= 5) return { label: `${m} min`, cls: 'soon' };
    return { label: fmtT(dt), cls: '' };
  };
  const modeInfo = info => {
    const m = (info.commercial_mode || '').toUpperCase();
    if (m.includes('TRAM')) return 'TRAM';
    if (m.includes('RER')) return 'RER';
    if (m.includes('MÉTRO') || m.includes('METRO')) return 'METRO';
    if (m.includes('RAIL') || m.includes('TRANS')) return 'RAIL';
    return 'BUS';
  };

  const lines = {};
  deps.forEach(d => {
    const info = d.display_informations || {};
    const key = `${info.label || '?'}_${info.direction || ''}`;
    if (!lines[key]) lines[key] = { info, deps: [], stop: d.stop_point?.name || stopName };
    const dt = d.stop_date_time?.departure_date_time;
    if (dt) lines[key].deps.push(dt);
  });

  if (!Object.keys(lines).length) { container.innerHTML = `<div class="err-box">Aucun départ dans les 2h.</div>`; return; }

  const ts = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  let html = `<div class="dep-header">
    <span class="dep-title">Départs · ${ts}</span>
    <button class="dep-refresh" onclick="loadDepartures('${stopId}',document.getElementById('stop-results'),'${stopName}')">↻ Actu.</button>
  </div><div class="dep-list">`;

  Object.values(lines)
    .sort((a, b) => (diffM(a.deps[0]) ?? 999) - (diffM(b.deps[0]) ?? 999))
    .forEach(line => {
      const info = line.info, mode = modeInfo(info);
      const code = info.label || info.code || '?';
      const dir = info.direction || code;
      const n1 = line.deps[0] ? fmtNext(line.deps[0]) : { label: '--', cls: '' };
      const n2 = line.deps[1] ? fmtNext(line.deps[1]) : { label: '', cls: '' };
      html += `<div class="dep-card">
        <div class="dep-badge ${mode}">${code}</div>
        <div class="dep-info">
          <div class="dep-dir">${dir}</div>
          <div class="dep-stop">${line.stop}</div>
        </div>
        <div class="dep-times">
          <div class="dep-t1 ${n1.cls}">${n1.label}</div>
          ${n2.label ? `<div class="dep-t2">${n2.label}</div>` : ''}
        </div>
      </div>`;
    });
  html += `</div>`;
  container.innerHTML = html;
}

// ═══════════════════════════════════════
// GÉOLOC ARRÊT
// ═══════════════════════════════════════
function locateStop() {
  const res = document.getElementById('stop-results');
  if (!navigator.geolocation) { res.innerHTML = `<div class="err-box">Géolocalisation non disponible.</div>`; return; }
  res.innerHTML = `<div class="loader"><div class="spin"></div>Localisation…</div>`;
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    map.setView([lat, lon], 15);
    try {
      const d = await primFetch('coverage/idfm/places_nearby', {
        lon, lat, 'type[]': 'stop_area', count: 1, distance: 600
      });
      const pl = (d.places_nearby || [])[0];
      if (!pl) throw new Error('Aucun arrêt dans un rayon de 600m.');
      const name = pl.stop_area?.name || pl.name;
      const id = pl.stop_area?.id || pl.id;
      const coord = pl.stop_area || pl;
      document.getElementById('stop-q').value = name;
      selectedStopId = id;
      if (coord.coord) drawStopOnMap(name, coord.coord.lat, coord.coord.lon);
      if (stopRefreshTimer) { clearInterval(stopRefreshTimer); stopRefreshTimer = null; }
      await loadDepartures(id, res, name);
      stopRefreshTimer = setInterval(() => loadDepartures(id, res, name), 30000);
    } catch (e) { res.innerHTML = `<div class="err-box">${e.message}</div>`; }
  }, () => { res.innerHTML = `<div class="err-box">Position inaccessible.</div>`; });
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
centerOnUser();

['from', 'to'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') searchRoute(); });
});
document.getElementById('stop-q').addEventListener('keydown', e => { if (e.key === 'Enter') searchStop(); });
</script>
